name: CI/CD - Build, Push, and Deploy

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  PROJECT_ID: cloud-internship-2025-499007
  REGION: asia-southeast1
  REPO_NAME: my-docker-repo
  SERVICE_NAME: my-app
  IMAGE_NAME: my-app

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Lấy code
      - name: Checkout code
        uses: actions/checkout@v4

      # Bước 2: Build Docker image
      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_NAME }}:latest .

      # Bước 3: Chạy container để test
      - name: Run container for testing
        run: docker run -d -p 8080:8080 --name test-container ${{ env.IMAGE_NAME }}:latest

      # Bước 4: Đợi container khởi động
      - name: Wait for container
        run: sleep 5

      # Bước 5: Test health endpoint
      - name: Test health endpoint
        run: curl -f http://localhost:8080/health

      # Bước 6: In logs nếu test thất bại
      - name: Show logs if failed
        if: failure()
        run: docker logs test-container

      # Bước 7: Dọn dẹp container test
      - name: Clean up test container
        run: docker stop test-container && docker rm test-container

  push-and-deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      # Bước 1: Lấy code (cần cho context build)
      - name: Checkout code
        uses: actions/checkout@v4

      # Bước 2: Xác thực với Google Cloud
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Bước 3: Cài đặt gcloud CLI
      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ env.PROJECT_ID }}

      # Bước 4: Cấu hình Docker xác thực với Artifact Registry
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      # Bước 5: Build Docker image
      - name: Build Docker image
        run: docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:latest .

      # Bước 6: Push image lên Artifact Registry
      - name: Push image to Artifact Registry
        run: docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:latest

      # Bước 7: Deploy lên Cloud Run
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:latest \
            --platform managed \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --port 8080 \
            --min-instances=0 \
            --max-instances=2

      # Bước 8: In URL của service
      - name: Show service URL
        run: |
          echo "Service URL: https://${{ env.SERVICE_NAME }}-xxxxxx-${{ env.REGION }}.a.run.app"